name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdb make gcc

      # - name: Build AVL tests
      #   run: make test_avl

      # - name: Run AVL tests with gdb
      #   run: |
      #     gdb -batch -ex "run" -ex "bt" -ex "quit" ./test_avl
      #   continue-on-error: true

      # - name: Build RB-tree tests
      #   run: make test_rb

      # - name: Run RB-tree tests with gdb
      #   run: |
      #     gdb -batch -ex "run" -ex "bt" -ex "quit" ./test_rb
      #   continue-on-error: true

      - name: Build B-tree tests
        run: make test_btree

      - name: Run B-tree tests with gdb
        run: |
          gdb -batch -ex "run" -ex "bt" -ex "quit" ./test_btree
        continue-on-error: true
