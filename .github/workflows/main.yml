name: Tests

on:
  push:

jobs:
  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build AVL tests
        run: make test_avl
      - name: Run AVL tests
        run: ./test_avl
      - name: Build RB-tree tests
        run: make test_rb
      - name: Run RB-tree tests
        run: ./test_rb
      - name: Build B-tree tests
        run: make test_btree
      - name: Run B-tree tests
        run: ./test_btree
